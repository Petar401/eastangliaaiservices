<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="'Space Mono', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07071a"/>
      <stop offset="0.55" stop-color="#0d0d2b"/>
      <stop offset="1" stop-color="#010108"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.62" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#00ffe7" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#00ffe7" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#00ffe7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trend" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#00ffe7" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="#00ffe7" stop-opacity="1"/>
      <stop offset="1" stop-color="#bf00ff" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#00ffe7" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#00ffe7" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="barTop" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#00ffe7" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#bf00ff" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#00ffe7" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="112" x2="1200" y2="112"/><line x1="0" y1="225" x2="1200" y2="225"/>
    <line x1="0" y1="337" x2="1200" y2="337"/><line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="562" x2="1200" y2="562"/>
    <line x1="150" y1="0" x2="150" y2="675"/><line x1="300" y1="0" x2="300" y2="675"/>
    <line x1="450" y1="0" x2="450" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/>
    <line x1="750" y1="0" x2="750" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/>
    <line x1="1050" y1="0" x2="1050" y2="675"/>
  </g>

  <!-- ambient glow over the rising area -->
  <circle cx="740" cy="280" r="340" fill="url(#glow)"/>

  <!-- baseline -->
  <line x1="120" y1="540" x2="1080" y2="540" stroke="#00ffe7" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- rising growth bars -->
  <g>
    <rect x="150" y="470" width="46" height="70"  rx="4" fill="url(#bar)" opacity="0.55"/>
    <rect x="226" y="430" width="46" height="110" rx="4" fill="url(#bar)" opacity="0.65"/>
    <rect x="302" y="392" width="46" height="148" rx="4" fill="url(#bar)" opacity="0.7"/>
    <rect x="378" y="418" width="46" height="122" rx="4" fill="url(#bar)" opacity="0.7"/>
    <rect x="454" y="350" width="46" height="190" rx="4" fill="url(#bar)" opacity="0.8"/>
    <rect x="530" y="306" width="46" height="234" rx="4" fill="url(#bar)" opacity="0.85"/>
    <rect x="606" y="332" width="46" height="208" rx="4" fill="url(#bar)" opacity="0.85"/>
    <rect x="682" y="252" width="46" height="288" rx="4" fill="url(#barTop)"/>
    <rect x="758" y="206" width="46" height="334" rx="4" fill="url(#barTop)"/>
  </g>

  <!-- glowing upward trend line through the bar tops, breaking up and out -->
  <polyline points="173,470 249,430 325,392 401,418 477,350 553,306 629,332 705,252 781,206 900,150 1010,108"
            fill="none" stroke="url(#trend)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)"/>
  <polyline points="173,470 249,430 325,392 401,418 477,350 553,306 629,332 705,252 781,206 900,150 1010,108"
            fill="none" stroke="url(#trend)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- arrow head at the top of the trend -->
  <g stroke="#bf00ff" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M1010 108 L972 116"/>
    <path d="M1010 108 L1002 146"/>
  </g>
  <circle cx="1010" cy="108" r="6" fill="#bf00ff"/>

  <!-- data nodes on the trend line -->
  <g fill="#00ffe7">
    <circle cx="325" cy="392" r="4.5" opacity="0.85"/>
    <circle cx="477" cy="350" r="4.5"/>
    <circle cx="629" cy="332" r="4.5"/>
    <circle cx="781" cy="206" r="5.5"/>
  </g>
  <circle cx="900" cy="150" r="5" fill="#bf00ff"/>

  <!-- label -->
  <text x="80" y="600" fill="#00ffe7" font-size="20" letter-spacing="6" font-weight="700">AI GROWTH &#183; SMALL BUSINESS</text>
  <text x="80" y="636" fill="#6b7280" font-size="16" letter-spacing="3">EAST ANGLIA AI SERVICES &#8212; NORFOLK &#183; SUFFOLK &#183; CAMBRIDGESHIRE &#183; ESSEX</text>

  <!-- corner ticks -->
  <g stroke="#00ffe7" stroke-opacity="0.4" stroke-width="2">
    <path d="M40 40 H80" fill="none"/><path d="M40 40 V80" fill="none"/>
    <path d="M1160 635 H1120" fill="none"/><path d="M1160 635 V595" fill="none"/>
  </g>
</svg>

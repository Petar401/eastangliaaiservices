<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="'Space Mono', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07071a"/>
      <stop offset="0.55" stop-color="#0d0d2b"/>
      <stop offset="1" stop-color="#010108"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00ffe7" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#00ffe7" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#00ffe7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00ffe7" stop-opacity="0.1"/>
      <stop offset="0.5" stop-color="#00ffe7" stop-opacity="1"/>
      <stop offset="1" stop-color="#bf00ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#00ffe7" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="112" x2="1200" y2="112"/><line x1="0" y1="225" x2="1200" y2="225"/>
    <line x1="0" y1="337" x2="1200" y2="337"/><line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="562" x2="1200" y2="562"/>
    <line x1="150" y1="0" x2="150" y2="675"/><line x1="300" y1="0" x2="300" y2="675"/>
    <line x1="450" y1="0" x2="450" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/>
    <line x1="750" y1="0" x2="750" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/>
    <line x1="1050" y1="0" x2="1050" y2="675"/>
  </g>

  <!-- ambient glow behind orb -->
  <circle cx="600" cy="338" r="320" fill="url(#glow)"/>

  <!-- voice waveform bars (representing a live call being answered) -->
  <g fill="#00ffe7">
    <rect x="120" y="318" width="6" height="40" rx="3" opacity="0.45"/>
    <rect x="148" y="298" width="6" height="80" rx="3" opacity="0.6"/>
    <rect x="176" y="268" width="6" height="140" rx="3" opacity="0.8"/>
    <rect x="204" y="238" width="6" height="200" rx="3"/>
    <rect x="232" y="208" width="6" height="260" rx="3"/>
    <rect x="260" y="248" width="6" height="180" rx="3"/>
    <rect x="288" y="288" width="6" height="100" rx="3" opacity="0.7"/>
    <rect x="316" y="258" width="6" height="160" rx="3" opacity="0.85"/>
    <rect x="344" y="218" width="6" height="240" rx="3"/>
    <rect x="372" y="278" width="6" height="120" rx="3" opacity="0.75"/>
    <rect x="400" y="308" width="6" height="60" rx="3" opacity="0.5"/>
  </g>

  <!-- central AI agent orb -->
  <circle cx="600" cy="338" r="96" fill="none" stroke="#00ffe7" stroke-opacity="0.25" stroke-width="1"/>
  <circle cx="600" cy="338" r="70" fill="none" stroke="#00ffe7" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="600" cy="338" r="70" fill="#00ffe7" fill-opacity="0.06"/>
  <circle cx="600" cy="338" r="120" fill="none" stroke="#bf00ff" stroke-opacity="0.18" stroke-width="1"/>
  <!-- soundwave glyph inside orb -->
  <g stroke="#00ffe7" stroke-width="4" stroke-linecap="round" filter="url(#soft)">
    <line x1="572" y1="320" x2="572" y2="356"/>
    <line x1="588" y1="306" x2="588" y2="370"/>
    <line x1="604" y1="296" x2="604" y2="380"/>
    <line x1="620" y1="312" x2="620" y2="364"/>
    <line x1="636" y1="324" x2="636" y2="352"/>
  </g>
  <g stroke="#00ffe7" stroke-width="4" stroke-linecap="round">
    <line x1="572" y1="320" x2="572" y2="356"/>
    <line x1="588" y1="306" x2="588" y2="370"/>
    <line x1="604" y1="296" x2="604" y2="380"/>
    <line x1="620" y1="312" x2="620" y2="364"/>
    <line x1="636" y1="324" x2="636" y2="352"/>
  </g>

  <!-- outgoing waveform -->
  <g fill="#bf00ff">
    <rect x="800" y="308" width="6" height="60" rx="3" opacity="0.5"/>
    <rect x="828" y="278" width="6" height="120" rx="3" opacity="0.7"/>
    <rect x="856" y="218" width="6" height="240" rx="3"/>
    <rect x="884" y="258" width="6" height="160" rx="3" opacity="0.85"/>
    <rect x="912" y="288" width="6" height="100" rx="3" opacity="0.7"/>
    <rect x="940" y="208" width="6" height="260" rx="3"/>
    <rect x="968" y="238" width="6" height="200" rx="3"/>
    <rect x="996" y="268" width="6" height="140" rx="3" opacity="0.8"/>
    <rect x="1024" y="298" width="6" height="80" rx="3" opacity="0.6"/>
    <rect x="1052" y="318" width="6" height="40" rx="3" opacity="0.45"/>
  </g>

  <!-- connection nodes -->
  <g fill="#00ffe7">
    <circle cx="232" cy="208" r="5"/><circle cx="344" cy="218" r="4"/>
    <circle cx="856" cy="218" r="4" fill="#bf00ff"/><circle cx="940" cy="208" r="5" fill="#bf00ff"/>
  </g>

  <!-- label -->
  <text x="80" y="588" fill="#00ffe7" font-size="20" letter-spacing="6" font-weight="700">VOICE AGENTS · CUSTOMER SERVICE</text>
  <text x="80" y="624" fill="#6b7280" font-size="16" letter-spacing="3">EAST ANGLIA AI SERVICES — NORFOLK · SUFFOLK · CAMBRIDGESHIRE · ESSEX</text>

  <!-- corner ticks -->
  <g stroke="#00ffe7" stroke-opacity="0.4" stroke-width="2">
    <path d="M40 40 H80" fill="none"/><path d="M40 40 V80" fill="none"/>
    <path d="M1160 635 H1120" fill="none"/><path d="M1160 635 V595" fill="none"/>
  </g>
</svg>

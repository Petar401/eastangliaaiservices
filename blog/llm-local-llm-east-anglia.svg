<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="'Space Mono', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07071a"/>
      <stop offset="0.55" stop-color="#0d0d2b"/>
      <stop offset="1" stop-color="#010108"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.66" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#00ffe7" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#00ffe7" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#00ffe7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d0d2b" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#07071a" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="unit" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00ffe7" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#00ffe7" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="unitHot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#bf00ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00ffe7" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="cable" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00ffe7" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#bf00ff" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="brainGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00ffe7" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#00ffe7" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#00ffe7" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="112" x2="1200" y2="112"/><line x1="0" y1="225" x2="1200" y2="225"/>
    <line x1="0" y1="337" x2="1200" y2="337"/><line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="562" x2="1200" y2="562"/>
    <line x1="150" y1="0" x2="150" y2="675"/><line x1="300" y1="0" x2="300" y2="675"/>
    <line x1="450" y1="0" x2="450" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/>
    <line x1="750" y1="0" x2="750" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/>
    <line x1="1050" y1="0" x2="1050" y2="675"/>
  </g>

  <!-- ambient glow over the brain -->
  <circle cx="838" cy="300" r="330" fill="url(#glow)"/>

  <!-- ===================== SERVER RACK (LOCAL) ===================== -->
  <g>
    <!-- rack frame -->
    <rect x="150" y="150" width="250" height="396" rx="16" fill="url(#rack)" stroke="#00ffe7" stroke-opacity="0.55" stroke-width="2"/>
    <rect x="150" y="150" width="250" height="396" rx="16" fill="none" stroke="#00ffe7" stroke-opacity="0.12" stroke-width="8"/>

    <!-- rack header -->
    <rect x="166" y="166" width="218" height="36" rx="6" fill="#010108" stroke="#00ffe7" stroke-opacity="0.3"/>
    <circle cx="186" cy="184" r="5" fill="#00ffe7"/>
    <text x="206" y="190" fill="#00ffe7" font-size="15" letter-spacing="3" font-weight="700">LOCAL · ON-PREM</text>

    <!-- server units -->
    <!-- unit 1 -->
    <rect x="166" y="214" width="218" height="46" rx="6" fill="url(#unit)" stroke="#00ffe7" stroke-opacity="0.28"/>
    <circle cx="184" cy="237" r="4" fill="#00ffe7"/><circle cx="198" cy="237" r="4" fill="#00ffe7" opacity="0.55"/><circle cx="212" cy="237" r="4" fill="#bf00ff"/>
    <g stroke="#00ffe7" stroke-opacity="0.4" stroke-width="2"><line x1="300" y1="230" x2="368" y2="230"/><line x1="300" y1="237" x2="368" y2="237"/><line x1="300" y1="244" x2="368" y2="244"/></g>

    <!-- unit 2 (hot / active) -->
    <rect x="166" y="266" width="218" height="46" rx="6" fill="url(#unitHot)" stroke="#bf00ff" stroke-opacity="0.45"/>
    <circle cx="184" cy="289" r="4" fill="#bf00ff"/><circle cx="198" cy="289" r="4" fill="#00ffe7"/><circle cx="212" cy="289" r="4" fill="#00ffe7" opacity="0.55"/>
    <g stroke="#00ffe7" stroke-opacity="0.45" stroke-width="2"><line x1="300" y1="282" x2="368" y2="282"/><line x1="300" y1="289" x2="368" y2="289"/><line x1="300" y1="296" x2="368" y2="296"/></g>

    <!-- unit 3 -->
    <rect x="166" y="318" width="218" height="46" rx="6" fill="url(#unit)" stroke="#00ffe7" stroke-opacity="0.28"/>
    <circle cx="184" cy="341" r="4" fill="#00ffe7"/><circle cx="198" cy="341" r="4" fill="#00ffe7" opacity="0.55"/><circle cx="212" cy="341" r="4" fill="#00ffe7" opacity="0.3"/>
    <g stroke="#00ffe7" stroke-opacity="0.4" stroke-width="2"><line x1="300" y1="334" x2="368" y2="334"/><line x1="300" y1="341" x2="368" y2="341"/><line x1="300" y1="348" x2="368" y2="348"/></g>

    <!-- unit 4 -->
    <rect x="166" y="370" width="218" height="46" rx="6" fill="url(#unit)" stroke="#00ffe7" stroke-opacity="0.28"/>
    <circle cx="184" cy="393" r="4" fill="#bf00ff" opacity="0.8"/><circle cx="198" cy="393" r="4" fill="#00ffe7"/><circle cx="212" cy="393" r="4" fill="#00ffe7" opacity="0.55"/>
    <g stroke="#00ffe7" stroke-opacity="0.4" stroke-width="2"><line x1="300" y1="386" x2="368" y2="386"/><line x1="300" y1="393" x2="368" y2="393"/><line x1="300" y1="400" x2="368" y2="400"/></g>

    <!-- unit 5 -->
    <rect x="166" y="422" width="218" height="46" rx="6" fill="url(#unit)" stroke="#00ffe7" stroke-opacity="0.28"/>
    <circle cx="184" cy="445" r="4" fill="#00ffe7"/><circle cx="198" cy="445" r="4" fill="#00ffe7" opacity="0.55"/><circle cx="212" cy="445" r="4" fill="#bf00ff"/>
    <g stroke="#00ffe7" stroke-opacity="0.4" stroke-width="2"><line x1="300" y1="438" x2="368" y2="438"/><line x1="300" y1="445" x2="368" y2="445"/><line x1="300" y1="452" x2="368" y2="452"/></g>

    <!-- rack footer / status bar -->
    <rect x="166" y="478" width="218" height="52" rx="6" fill="#010108" stroke="#00ffe7" stroke-opacity="0.25"/>
    <text x="182" y="500" fill="#6b7280" font-size="12" letter-spacing="2">YOUR DATA · YOUR WALLS</text>
    <rect x="182" y="510" width="186" height="6" rx="3" fill="#00ffe7" opacity="0.12"/>
    <rect x="182" y="510" width="132" height="6" rx="3" fill="#00ffe7"/>
  </g>

  <!-- ===================== DATA CABLES ===================== -->
  <g fill="none" stroke="url(#cable)" stroke-width="3" stroke-linecap="round" filter="url(#soft)" opacity="0.85">
    <path d="M400 289 C 470 289, 510 250, 600 250"/>
    <path d="M400 341 C 480 341, 520 330, 600 320"/>
    <path d="M400 393 C 470 393, 520 400, 600 390"/>
  </g>
  <g fill="none" stroke="url(#cable)" stroke-width="1.8" stroke-linecap="round">
    <path d="M400 289 C 470 289, 510 250, 600 250"/>
    <path d="M400 341 C 480 341, 520 330, 600 320"/>
    <path d="M400 393 C 470 393, 520 400, 600 390"/>
  </g>
  <g fill="#00ffe7">
    <circle cx="600" cy="250" r="4"/><circle cx="600" cy="320" r="4"/><circle cx="600" cy="390" r="4"/>
  </g>

  <!-- ===================== BRAIN / NEURAL NET ===================== -->
  <circle cx="838" cy="300" r="210" fill="url(#brainGlow)"/>

  <!-- brain outline (stylised, facing right) -->

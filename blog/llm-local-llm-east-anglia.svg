    <path d="M700 300
             C 690 232, 742 188, 802 196
             C 822 168, 872 164, 898 190
             C 944 184, 986 220, 980 268
             C 1008 292, 1004 344, 968 360
             C 966 404, 918 430, 878 414
             C 850 442, 800 438, 784 404
             C 736 408, 700 374, 712 336
             C 698 326, 696 310, 700 300 Z"
          fill="none" stroke="#00ffe7" stroke-width="4"/>
  </g>
  <path d="M700 300
           C 690 232, 742 188, 802 196
           C 822 168, 872 164, 898 190
           C 944 184, 986 220, 980 268
           C 1008 292, 1004 344, 968 360
           C 966 404, 918 430, 878 414
           C 850 442, 800 438, 784 404
           C 736 408, 700 374, 712 336
           C 698 326, 696 310, 700 300 Z"
        fill="none" stroke="#00ffe7" stroke-width="2.4" stroke-opacity="0.9"/>

  <!-- brain folds -->
  <g fill="none" stroke="#00ffe7" stroke-width="1.6" stroke-opacity="0.4" stroke-linecap="round">
    <path d="M812 206 C 800 246, 838 262, 822 300 C 808 332, 846 350, 838 392"/>
    <path d="M884 198 C 902 232, 866 256, 900 286 C 928 312, 894 340, 916 372"/>
    <path d="M760 250 C 792 268, 770 300, 798 322"/>
    <path d="M946 250 C 916 272, 944 300, 922 326"/>
  </g>

  <!-- neural nodes -->
  <g>
    <line x1="784" y1="244" x2="858" y2="232" stroke="#00ffe7" stroke-opacity="0.5" stroke-width="1.4"/>
    <line x1="858" y1="232" x2="916" y2="262" stroke="#00ffe7" stroke-opacity="0.5" stroke-width="1.4"/>
    <line x1="784" y1="244" x2="812" y2="312" stroke="#00ffe7" stroke-opacity="0.5" stroke-width="1.4"/>
    <line x1="858" y1="232" x2="868" y2="316" stroke="#00ffe7" stroke-opacity="0.5" stroke-width="1.4"/>
    <line x1="916" y1="262" x2="868" y2="316" stroke="#00ffe7" stroke-opacity="0.5" stroke-width="1.4"/>
    <line x1="812" y1="312" x2="868" y2="316" stroke="#00ffe7" stroke-opacity="0.5" stroke-width="1.4"/>
    <line x1="812" y1="312" x2="850" y2="378" stroke="#00ffe7" stroke-opacity="0.5" stroke-width="1.4"/>
    <line x1="868" y1="316" x2="850" y2="378" stroke="#00ffe7" stroke-opacity="0.5" stroke-width="1.4"/>
    <line x1="916" y1="262" x2="912" y2="338" stroke="#00ffe7" stroke-opacity="0.45" stroke-width="1.4"/>
    <line x1="868" y1="316" x2="912" y2="338" stroke="#00ffe7" stroke-opacity="0.45" stroke-width="1.4"/>
  </g>
  <g>
    <circle cx="784" cy="244" r="6.5" fill="#00ffe7"/>
    <circle cx="858" cy="232" r="7.5" fill="#bf00ff"/>
    <circle cx="916" cy="262" r="6.5" fill="#00ffe7"/>
    <circle cx="812" cy="312" r="7" fill="#00ffe7"/>
    <circle cx="868" cy="316" r="8" fill="#bf00ff"/>
    <circle cx="912" cy="338" r="6" fill="#00ffe7"/>
    <circle cx="850" cy="378" r="6.5" fill="#00ffe7"/>
  </g>

  <!-- LLM token chips drifting from the brain -->
  <g font-size="13" letter-spacing="1" font-weight="700">
    <rect x="1006" y="214" width="58" height="26" rx="13" fill="#010108" stroke="#00ffe7" stroke-opacity="0.5"/>
    <text x="1018" y="231" fill="#00ffe7">LLM</text>
    <rect x="1018" y="300" width="84" height="26" rx="13" fill="#010108" stroke="#bf00ff" stroke-opacity="0.5"/>
    <text x="1030" y="317" fill="#bf00ff">PROMPT</text>
    <rect x="996" y="372" width="92" height="26" rx="13" fill="#010108" stroke="#00ffe7" stroke-opacity="0.5"/>
    <text x="1008" y="389" fill="#00ffe7">PRIVATE</text>
  </g>

  <!-- label -->
  <text x="80" y="612" fill="#00ffe7" font-size="20" letter-spacing="6" font-weight="700">LOCAL LLM &#183; PRIVATE AI</text>
  <text x="80" y="644" fill="#6b7280" font-size="16" letter-spacing="3">EAST ANGLIA AI SERVICES &#8212; NORFOLK &#183; SUFFOLK &#183; CAMBRIDGESHIRE &#183; ESSEX</text>

  <!-- corner ticks -->
  <g stroke="#00ffe7" stroke-opacity="0.4" stroke-width="2">
    <path d="M40 40 H80" fill="none"/><path d="M40 40 V80" fill="none"/>
    <path d="M1160 635 H1120" fill="none"/><path d="M1160 635 V595" fill="none"/>
  </g>
</svg>
